
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Menú Principal</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #3730a3;
        }
        h1 {
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇵🇪 Bienvenido</h1>
        <button onclick="location.href='/buscar'">🔍 Buscar Guías</button>
        <button onclick="location.href='/misreservas'">📋 Mis Reservas</button>
        <button onclick="location.href='/logout'">🚪 Cerrar Sesión</button>
    </div>
</body>
</html>
